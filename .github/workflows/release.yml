name: Release native host

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Static checks and unit tests
        shell: pwsh
        run: |
          cargo fmt --manifest-path native-host/Cargo.toml -- --check
          cargo test --manifest-path native-host/Cargo.toml --locked
          node --check daemon.mjs
          node --check server.mjs
          node --check tests/protocol-regression.mjs
          node --check tests/fallback-regression.mjs
          node --check tests/control-plane-integration.mjs
          node --check tests/approval-lifecycle.mjs
          node --check tests/installer-contract.mjs
          node --check tests/server-lifecycle.mjs
          node tests/installer-contract.mjs
          node tests/server-lifecycle.mjs
          [scriptblock]::Create((Get-Content install.ps1 -Raw)) | Out-Null
          [scriptblock]::Create((Get-Content uninstall.ps1 -Raw)) | Out-Null
          [scriptblock]::Create((Get-Content overlay.ps1 -Raw)) | Out-Null
          [scriptblock]::Create((Get-Content tests/run-control-plane.ps1 -Raw)) | Out-Null
          [xml](Get-Content card.xaml -Raw) | Out-Null
      - name: Build fixture and native host
        shell: pwsh
        run: |
          ./tests/build-fixture.ps1
          cargo build --release --manifest-path native-host/Cargo.toml --locked
      # UIA / interactive regressions often fail on headless GitHub runners (no real desktop).
      # Keep them visible but do not block publishing the verified native host.
      - name: Native and control-plane regressions (best effort)
        continue-on-error: true
        shell: pwsh
        run: |
          node tests/protocol-regression.mjs
          node tests/fallback-regression.mjs
          node tests/approval-lifecycle.mjs
          ./tests/run-control-plane.ps1
      - name: Confirm release version matches tag
        shell: pwsh
        run: |
          $version = (Select-String -Path native-host/Cargo.toml -Pattern '^version = "([^"]+)"$').Matches[0].Groups[1].Value
          if ("v$version" -ne '${{ github.ref_name }}') { throw "Cargo version v$version does not match tag ${{ github.ref_name }}" }
      - name: Generate checksum
        shell: pwsh
        run: |
          Copy-Item native-host/target/release/cua-native-host.exe .
          $hash = (Get-FileHash cua-native-host.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  cua-native-host.exe" | Set-Content SHA256SUMS.txt -Encoding ascii
          Get-Content SHA256SUMS.txt
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FastCUA ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            cua-native-host.exe
            SHA256SUMS.txt
