name: Release native host

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: write

jobs:
  windows-release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && github.event.head_commit.message == 'Release v0.1.0')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build native host
        run: cargo build --release --manifest-path native-host/Cargo.toml --locked
      - name: Generate checksum
        shell: pwsh
        run: |
          Copy-Item native-host/target/release/cua-native-host.exe .
          $hash = (Get-FileHash cua-native-host.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  cua-native-host.exe" | Set-Content SHA256SUMS.txt -Encoding ascii
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.1.0' }}
          name: FastCUA v0.1.0
          files: |
            cua-native-host.exe
            SHA256SUMS.txt

