name: Apply close and pause semantics fix

on:
  push:
    paths:
      - '.github/workflows/fix-close-pause-semantics.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message != 'Apply close and pause semantics'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch semantics and tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new, count=1):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f'{path}: expected {count} matches, found {actual}: {old[:100]!r}')
              p.write_text(text.replace(old, new, count), encoding='utf-8', newline='\n')

          # MCP lifetime: no agent-visible close state. The stdio process simply
          # disconnects its pipe when the client ends it, and a future MCP process
          # may connect normally.
          replace('server.mjs',
              'constructor() { this.sock = null; this.buf = ""; this.pending = new Map(); this.nextId = 1; this.connectPromise = null; this.closed = false; }',
              'constructor() { this.sock = null; this.buf = ""; this.pending = new Map(); this.nextId = 1; this.connectPromise = null; }')
          replace('server.mjs',
              '    if (this.closed) throw new Error("computer-use session is closed");\n',
              '', count=2)
          replace('server.mjs',
              '''  async close() {
    if (this.closed) return;
    try { await this.request("close", {}); } catch {}
    this.closed = true;
    try { this.sock && this.sock.end(); } catch {}
  }
''',
              '''  disconnect() {
    try { this.sock && this.sock.end(); } catch {}
    this.sock = null;
  }
''')
          replace('server.mjs',
              '  close: async () => { await daemon.close(); return { ok: true }; },\n',
              '')
          replace('server.mjs',
              '// ---- tool definitions (window2 + end_turn + close + js) ----',
              '// ---- tool definitions (window2 + end_turn + js) ----')
          replace('server.mjs',
              '  { name: "close", desc: "Disconnect this session from the shared computer-use daemon. Call when computer-use work is DONE for this session. The shared helper itself stays resident (other windows may use it) and auto-exits after 5 min idle.", inputSchema: { type: "object", properties: {} } },\n',
              '')
          replace('server.mjs',
              '    case "close": return await sky.close();\n',
              '')
          replace('server.mjs',
              'process.stdin.on("end", () => { try { daemon.close(); } catch {} process.exit(0); });',
              'process.stdin.on("end", () => { daemon.disconnect(); process.exit(0); });')

          # Daemon semantics: end_turn clears a turn; pause only pauses. It must
          # not kill the native host or erase the in-flight action record.
          replace('daemon.mjs',
              '  if (method === "close") { clearClientInterrupt(c); reply(c, id, { result: { ok: true } }); return; }\n',
              '')
          replace('daemon.mjs',
              '          else if (action === "pause") { isUserPaused = true; resetBinary(); currentAction = null; emitEvent("paused", { client: "user" }); log("action: user paused desktop control"); }',
              '          else if (action === "pause") { isUserPaused = true; emitEvent("paused", { client: "user" }); log("action: user paused desktop control without terminating processes"); }')

          # Skill: normal completion is end_turn. Process exit remains a user or
          # client lifecycle action and is never represented as a session state.
          replace('skills/computer-use/SKILL.md',
              '- `end_turn`: clear the current turn\'s interrupt scope when more computer-use work will continue in the same session.\n- `close`: disconnect this session from the resident daemon when computer-use work is finished.\n',
              '- `end_turn`: finish the current computer-use turn and clear its interrupt scope without closing MCP, daemon, or native Host processes.\n')
          replace('skills/computer-use/SKILL.md',
              '''## Ending

When computer-use work is done for the session, call `close`. The shared helper remains resident for other clients and exits after its configured idle period. Call `end_turn` only when computer-use work will continue in the same session.
''',
              '''## Ending

After the current computer-use task is complete and verified, call `end_turn`. This clears only the current turn and keeps the MCP connection, daemon, and native Host available for later tasks.

Pause means pause: it blocks new desktop actions but does not terminate any process. Closing or exiting FastCUA is a process-lifecycle action controlled by the user or AI client, not a turn or session state. Do not invent a closed-session state.
''')

          # MCP lifecycle contract: close is not exposed; end_turn leaves the same
          # MCP process usable.
          p = Path('tests/server-lifecycle.mjs')
          text = p.read_text(encoding='utf-8')
          text = text.replace(
              '  assert.ok(!names.includes("set_value"));\n',
              '  assert.ok(!names.includes("set_value"));\n  assert.ok(!names.includes("close"));\n')
          old = '''  const closed = await rpc("tools/call", { name: "close", arguments: {} });
  assert.equal(closed.isError, false);
  const afterClose = await rpc("tools/call", { name: "list_windows", arguments: {} });
  assert.equal(afterClose.isError, true);
  assert.match(afterClose.content[0].text, /session is closed/i);
  assert.equal(calls.filter(method => method === "list_windows").length, 1);
  console.log("PASS close prevents old work from reconnecting");
'''
          new = '''  const ended = await rpc("tools/call", { name: "end_turn", arguments: {} });
  assert.equal(ended.isError, false);
  const afterEndTurn = await rpc("tools/call", { name: "list_windows", arguments: {} });
  assert.equal(afterEndTurn.isError, false);
  assert.equal(calls.filter(method => method === "list_windows").length, 2);
  console.log("PASS end_turn keeps the MCP process usable and close is not exposed");
'''
          if text.count(old) != 1:
              raise SystemExit('tests/server-lifecycle.mjs: old close lifecycle block not found exactly once')
          p.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          # Control-plane contract: create the helper first, then prove pause and
          # resume preserve the same native process.
          p = Path('tests/control-plane-integration.mjs')
          text = p.read_text(encoding='utf-8')
          old = '''  await api("/api/action", { action: "pause" });
  assert.equal((await api("/api/state")).controlState, "paused_by_user");
  await assert.rejects(client.request("list_windows"), /paused by the user/i);
  console.log("PASS manual pause blocks pipe requests");

  await api("/api/action", { action: "resume" });
  assert.equal((await api("/api/state")).controlState, "running");
  assert.ok(Array.isArray(await client.request("list_windows")));
  console.log("PASS one-action resume restores requests");
'''
          new = '''  assert.ok(Array.isArray(await client.request("list_windows")));
  const binaryPidBeforePause = (await api("/api/state")).binaryPid;
  assert.ok(binaryPidBeforePause, "native helper should be running before pause");

  await api("/api/action", { action: "pause" });
  const pausedState = await api("/api/state");
  assert.equal(pausedState.controlState, "paused_by_user");
  assert.equal(pausedState.binaryPid, binaryPidBeforePause);
  await assert.rejects(client.request("list_windows"), /paused by the user/i);
  console.log("PASS manual pause blocks requests without terminating processes");

  await api("/api/action", { action: "resume" });
  const resumedState = await api("/api/state");
  assert.equal(resumedState.controlState, "running");
  assert.equal(resumedState.binaryPid, binaryPidBeforePause);
  assert.ok(Array.isArray(await client.request("list_windows")));
  console.log("PASS resume restores requests on the same native process");
'''
          if text.count(old) != 1:
              raise SystemExit('tests/control-plane-integration.mjs: old pause block not found exactly once')
          p.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          # The one-shot workflow removes itself in the patch commit.
          Path('.github/workflows/fix-close-pause-semantics.yml').unlink()
          PY

          node --check server.mjs
          node --check daemon.mjs
          node --check tests/server-lifecycle.mjs
          node --check tests/control-plane-integration.mjs
          git diff --check

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.mjs daemon.mjs skills/computer-use/SKILL.md tests/server-lifecycle.mjs tests/control-plane-integration.mjs .github/workflows/fix-close-pause-semantics.yml
          git commit -m 'Apply close and pause semantics'
          git push
